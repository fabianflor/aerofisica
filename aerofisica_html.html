<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
<title>AeroFísica — Cinemática</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#080f1a;color:#fff;font-family:sans-serif;display:flex;flex-direction:column;align-items:center;padding:8px;overflow-x:hidden;}
h1{font-size:18px;color:#4fc3f7;margin:4px 0 2px;letter-spacing:1px;}
.sub{font-size:11px;color:#7aa;margin-bottom:6px;}
#hud{display:flex;flex-wrap:wrap;gap:5px;justify-content:center;margin-bottom:5px;}
.hi{background:rgba(255,255,255,0.07);border-radius:7px;padding:3px 8px;text-align:center;min-width:64px;}
.hl{font-size:9px;color:#999;}
.hv{font-size:13px;font-weight:bold;}
canvas{border:2px solid #1565c0;border-radius:10px;display:block;}
#minimap{display:block;margin:3px auto 0;}
#mapleg{font-size:9px;color:#556;margin:2px 0 6px;text-align:center;}
#controls{display:flex;flex-direction:column;align-items:center;gap:6px;margin-top:8px;}
.crow{display:flex;gap:8px;}
.cb{width:62px;height:62px;border-radius:12px;background:rgba(255,255,255,0.1);border:2px solid #1565c0;color:#fff;font-size:24px;display:flex;align-items:center;justify-content:center;cursor:pointer;user-select:none;-webkit-user-select:none;touch-action:none;}
.cb:active{background:rgba(79,195,247,0.3);border-color:#4fc3f7;}
#overlay{position:fixed;inset:0;background:rgba(0,0,0,0.88);display:flex;align-items:center;justify-content:center;z-index:100;padding:12px;}
.modal{background:#0d1b2e;border-radius:16px;padding:22px 18px;max-width:380px;width:100%;text-align:center;}
.modal h2{font-size:18px;margin:6px 0 10px;}
.modal .def{font-size:13px;line-height:1.65;color:#e0e0e0;margin-bottom:10px;}
.modal .ej{background:rgba(255,255,255,0.06);border-radius:8px;padding:9px 12px;font-size:12px;color:#ccc;margin-bottom:14px;text-align:left;line-height:1.5;}
.bok{border:none;border-radius:9px;padding:12px 0;font-size:15px;font-weight:bold;cursor:pointer;width:100%;}
.qopt{display:block;width:100%;background:rgba(255,255,255,0.07);border:1px solid #555;border-radius:8px;padding:10px 12px;color:#fff;cursor:pointer;text-align:left;font-size:13px;margin-bottom:7px;font-family:sans-serif;}
.qopt:active{background:rgba(79,195,247,0.25);}
.rbox{border-radius:10px;padding:12px 14px;margin-top:8px;font-size:13px;line-height:1.5;}
#alertbar{position:fixed;top:8px;left:50%;transform:translateX(-50%);padding:6px 16px;border-radius:8px;font-size:12px;font-weight:bold;display:none;z-index:99;animation:pulse .6s infinite alternate;white-space:nowrap;pointer-events:none;}
@keyframes pulse{from{opacity:1}to{opacity:.4}}
</style>
</head>
<body>
<h1>🛩️ AeroFísica — Cinemática</h1>
<p class="sub">Bachillerato · Usa los botones o las flechas del teclado</p>

<div id="hud">
  <div class="hi"><div class="hl">⏱ t</div><div class="hv" id="ht" style="color:#fff176">0.0s</div></div>
  <div class="hi"><div class="hl">📍 Posición</div><div class="hv" id="hx" style="color:#4fc3f7">0m</div></div>
  <div class="hi"><div class="hl">↔ Δx</div><div class="hv" id="hdx" style="color:#ffab91">0m</div></div>
  <div class="hi"><div class="hl">💨 Rapidez</div><div class="hv" id="hspd" style="color:#ce93d8">0m/s</div></div>
  <div class="hi"><div class="hl">🚀 Velocidad</div><div class="hv" id="hvel" style="color:#f48fb1">+0m/s</div></div>
  <div class="hi"><div class="hl">🧠 Quiz</div><div class="hv" id="hq" style="color:#a5d6a7">0/3</div></div>
</div>

<canvas id="c"></canvas>
<svg id="minimap" height="28"></svg>
<div id="mapleg"></div>

<div id="controls">
  <div class="crow"><button class="cb" id="bU">▲</button></div>
  <div class="crow">
    <button class="cb" id="bL">◀</button>
    <button class="cb" id="bD">▼</button>
    <button class="cb" id="bR">▶</button>
  </div>
</div>

<div id="alertbar"></div>
<div id="overlay"></div>

<script>
// ── DATA ──────────────────────────────────────────────────────────────────────
var STOPS=[
  {id:"pos",x:400,color:"#4fc3f7",icon:"📍",title:"Posición",
   def:"La POSICIÓN (x) es el lugar donde se encuentra un objeto, medido desde un punto de referencia llamado ORIGEN (x = 0).",
   ej:"Ahora estás en x = 400 m. El origen es la torre de control al inicio de la pista."},
  {id:"inst",x:750,color:"#fff176",icon:"⏱",title:"Instante de Tiempo",
   def:"Un INSTANTE DE TIEMPO (t) es un momento puntual en el tiempo. Como una fotografía: captura el estado exacto en ese segundo.",
   ej:"Cuando llegaste aquí el reloj marcaba un instante t exacto, visible en el marcador superior."},
  {id:"intv",x:1150,color:"#a5d6a7",icon:"⏳",title:"Intervalo de Tiempo",
   def:"El INTERVALO DE TIEMPO (Δt) es la duración entre dos instantes: Δt = t₂ − t₁. Siempre es un valor positivo.",
   ej:"Si saliste a t = 0 s y llegaste aquí a t = 15 s, entonces Δt = 15 s."},
  {id:"desp",x:1600,color:"#ffab91",icon:"↔",title:"Desplazamiento",
   def:"El DESPLAZAMIENTO (Δx) es el cambio de posición: Δx = x₂ − x₁. Tiene dirección: positivo (→) si avanzas, negativo (←) si retrocedes.",
   ej:"Partiste de x = 0. Ahora estás en x = 1600 m. Tu desplazamiento es Δx = +1600 m."},
  {id:"rap",x:2100,color:"#ce93d8",icon:"💨",title:"Rapidez",
   def:"La RAPIDEZ es la distancia total recorrida dividida entre el tiempo. Es un escalar: siempre mayor o igual a cero, sin dirección.",
   ej:"Tu velocímetro muestra la rapidez. Siempre positiva, sin importar hacia dónde vayas."},
  {id:"vel",x:2650,color:"#f48fb1",icon:"🚀",title:"Velocidad",
   def:"La VELOCIDAD (v) = Δx / Δt. Es un VECTOR: tiene magnitud y dirección. v > 0 si avanzas, v < 0 si retrocedes.",
   ej:"Si Δx = 2650 m y Δt = 40 s → v = 66.25 m/s hacia adelante. ¡Siempre lleva signo!"},
];
var QUIZZES=[
  {x:950,q:"Estás en x = 200 m y te mueves a x = 950 m. ¿Cuál es tu desplazamiento?",
   opts:["750 m →","1150 m →","−750 m ←","950 m"],c:0,
   exp:"Δx = x₂ − x₁ = 950 − 200 = 750 m en dirección positiva ✅"},
  {x:1900,q:"Un avión vuela 400 m en 8 s. ¿Cuál es su rapidez?",
   opts:["50 m/s","3200 m/s","408 m/s","0.02 m/s"],c:0,
   exp:"Rapidez = distancia ÷ tiempo = 400 ÷ 8 = 50 m/s ✅"},
  {x:2900,q:"¿Por qué la velocidad puede ser negativa pero la rapidez no?",
   opts:["Porque la velocidad es un vector con dirección","Porque la rapidez es siempre mayor","Son exactamente lo mismo","La velocidad siempre es positiva"],c:0,
   exp:"La velocidad indica dirección (vector). Negativa = retrocede. La rapidez es escalar: solo magnitud ✅"},
];
var TW=3200;

// ── CANVAS SETUP ──────────────────────────────────────────────────────────────
var cv=document.getElementById("c");
var CW=Math.min(window.innerWidth-16,800);
var CH=Math.round(CW*0.52);
cv.width=CW; cv.height=CH;
var GY=CH*0.67; // ground y
var ctx=cv.getContext("2d");

// ── STATE ─────────────────────────────────────────────────────────────────────
var S={x:50,y:CH*0.38,vx:0,vy:0,t:0,hist:[],seenS:new Set(),seenQ:new Set()};
var keys={L:false,R:false,U:false,D:false};
var paused=false, qScore=0, lastTs=null, animId=null;

// ── CONTROLS ──────────────────────────────────────────────────────────────────
function bindBtn(id,k){
  var el=document.getElementById(id);
  ["touchstart","mousedown"].forEach(function(ev){
    el.addEventListener(ev,function(e){e.preventDefault();keys[k]=true;},{passive:false});
  });
  ["touchend","touchcancel","mouseup","mouseleave"].forEach(function(ev){
    el.addEventListener(ev,function(e){e.preventDefault();keys[k]=false;},{passive:false});
  });
}
bindBtn("bL","L"); bindBtn("bR","R"); bindBtn("bU","U"); bindBtn("bD","D");
document.addEventListener("keydown",function(e){
  if(e.key==="ArrowLeft"||e.key==="a")keys.L=true;
  if(e.key==="ArrowRight"||e.key==="d")keys.R=true;
  if(e.key==="ArrowUp"||e.key==="w")keys.U=true;
  if(e.key==="ArrowDown"||e.key==="s")keys.D=true;
  if(["ArrowUp","ArrowDown","ArrowLeft","ArrowRight"].indexOf(e.key)>-1)e.preventDefault();
});
document.addEventListener("keyup",function(e){
  if(e.key==="ArrowLeft"||e.key==="a")keys.L=false;
  if(e.key==="ArrowRight"||e.key==="d")keys.R=false;
  if(e.key==="ArrowUp"||e.key==="w")keys.U=false;
  if(e.key==="ArrowDown"||e.key==="s")keys.D=false;
});

// ── DRAW ──────────────────────────────────────────────────────────────────────
function drawScene(){
  var s=S, camX=Math.max(0,Math.min(TW-CW,s.x-CW*0.35));
  // Sky
  var sg=ctx.createLinearGradient(0,0,0,GY);
  sg.addColorStop(0,"#07111f");sg.addColorStop(1,"#0d2a4a");
  ctx.fillStyle=sg;ctx.fillRect(0,0,CW,GY);
  // Clouds
  [180,420,680,950,1250,1600,1950,2300,2700,3050].forEach(function(cx,i){
    var sx=cx-camX*0.35,sy=44+(i%3)*26;
    if(sx<-80||sx>CW+80)return;
    ctx.fillStyle="rgba(255,255,255,0.1)";
    [0,25,-20].forEach(function(dx){ctx.beginPath();ctx.arc(sx+dx,sy,20,0,Math.PI*2);ctx.fill();});
  });
  // Mountains
  [[250,85],[600,110],[1000,78],[1400,105],[1850,90],[2250,115],[2700,82],[3100,98]].forEach(function(m,i){
    var sx=m[0]-camX,mh=m[1];
    if(sx<-140||sx>CW+140)return;
    ctx.fillStyle=i%2?"#1c2e40":"#243447";
    ctx.beginPath();ctx.moveTo(sx-78,GY);ctx.lineTo(sx,GY-mh);ctx.lineTo(sx+78,GY);ctx.closePath();ctx.fill();
    ctx.fillStyle="rgba(255,255,255,0.6)";
    ctx.beginPath();ctx.moveTo(sx-15,GY-mh+15);ctx.lineTo(sx,GY-mh);ctx.lineTo(sx+15,GY-mh+15);ctx.closePath();ctx.fill();
  });
  // Ground
  var gg=ctx.createLinearGradient(0,GY,0,CH);
  gg.addColorStop(0,"#1e4d0f");gg.addColorStop(1,"#0f2a07");
  ctx.fillStyle=gg;ctx.fillRect(0,GY,CW,CH-GY);
  // Runway
  ctx.fillStyle="#3a3a3a";ctx.fillRect(0,GY,CW,22);
  ctx.strokeStyle="#fff";ctx.setLineDash([24,16]);ctx.lineWidth=2;
  ctx.beginPath();ctx.moveTo(0,GY+11);ctx.lineTo(CW,GY+11);ctx.stroke();
  ctx.setLineDash([]);
  // KM markers
  for(var m=0;m<=TW;m+=200){
    var sx=m-camX;
    if(sx<-30||sx>CW+30)continue;
    ctx.strokeStyle="rgba(255,213,79,0.5)";ctx.lineWidth=1;ctx.setLineDash([3,3]);
    ctx.beginPath();ctx.moveTo(sx,GY-6);ctx.lineTo(sx,GY+2);ctx.stroke();
    ctx.setLineDash([]);
    ctx.fillStyle="rgba(255,213,79,0.8)";ctx.font="bold 9px monospace";ctx.textAlign="center";
    ctx.fillText(m+"m",sx,GY-8);
  }
  // Origin pole
  var ox=0-camX;
  if(ox>-20&&ox<CW+20){
    ctx.fillStyle="#ff5722";ctx.fillRect(ox-2,GY-36,4,38);
    ctx.font="bold 10px sans-serif";ctx.textAlign="center";ctx.fillStyle="#ff5722";
    ctx.fillText("x=0",ox,GY-40);
  }
  // Stop flags
  STOPS.forEach(function(st){
    var sx=st.x-camX;
    if(sx<-50||sx>CW+50)return;
    ctx.strokeStyle=st.color;ctx.lineWidth=2;ctx.setLineDash([5,4]);
    ctx.beginPath();ctx.moveTo(sx,GY-72);ctx.lineTo(sx,GY);ctx.stroke();
    ctx.setLineDash([]);
    ctx.fillStyle="rgba(0,0,0,0.8)";ctx.strokeStyle=st.color;ctx.lineWidth=1.5;
    ctx.beginPath();ctx.roundRect(sx-52,GY-98,104,24,5);ctx.fill();ctx.stroke();
    ctx.fillStyle=st.color;ctx.font="bold 10px sans-serif";ctx.textAlign="center";
    ctx.fillText(st.icon+" "+st.title,sx,GY-81);
  });
  // Quiz flags
  QUIZZES.forEach(function(q){
    var sx=q.x-camX;
    if(sx<-50||sx>CW+50)return;
    ctx.strokeStyle="#ff9800";ctx.lineWidth=2;ctx.setLineDash([4,4]);
    ctx.beginPath();ctx.moveTo(sx,GY-58);ctx.lineTo(sx,GY);ctx.stroke();
    ctx.setLineDash([]);
    ctx.fillStyle="rgba(60,28,0,0.88)";ctx.strokeStyle="#ff9800";ctx.lineWidth=1.5;
    ctx.beginPath();ctx.roundRect(sx-32,GY-78,64,20,5);ctx.fill();ctx.stroke();
    ctx.fillStyle="#ff9800";ctx.font="bold 9px sans-serif";ctx.textAlign="center";
    ctx.fillText("🧠 QUIZ",sx,GY-64);
  });
  // Displacement arrow
  if(s.x>5){
    var ax=Math.max(0-camX,-5),bx=Math.min(s.x-camX,CW+5),ay=GY+34;
    ctx.strokeStyle="rgba(255,112,67,0.55)";ctx.lineWidth=2;
    ctx.beginPath();ctx.moveTo(ax,ay);ctx.lineTo(bx,ay);ctx.stroke();
    if(bx<CW+4){
      ctx.fillStyle="#ff7043";
      ctx.beginPath();ctx.moveTo(bx,ay-4);ctx.lineTo(bx+7,ay);ctx.lineTo(bx,ay+4);ctx.closePath();ctx.fill();
    }
    var mx2=Math.min(Math.max((ax+bx)/2,38),CW-52);
    ctx.fillStyle="rgba(255,112,67,0.85)";ctx.font="bold 9px monospace";ctx.textAlign="center";
    ctx.fillText("Δx="+Math.round(s.x)+"m",mx2,ay-6);
  }
  // Graph
  if(s.hist.length>1){
    var gx=CW-148,gy=6,gw=142,gh=60;
    ctx.fillStyle="rgba(0,0,0,0.68)";ctx.strokeStyle="#4fc3f7";ctx.lineWidth=1;
    ctx.beginPath();ctx.roundRect(gx,gy,gw,gh,5);ctx.fill();ctx.stroke();
    ctx.fillStyle="#90caf9";ctx.font="9px monospace";ctx.textAlign="left";
    ctx.fillText("x(t) posición vs tiempo",gx+4,gy+12);
    var mt=Math.max(s.hist[s.hist.length-1].t,1);
    ctx.strokeStyle="#4fc3f7";ctx.lineWidth=2;ctx.beginPath();
    s.hist.forEach(function(p,i){
      var hx=gx+5+(p.t/mt)*(gw-10),hy=gy+gh-4-(p.x/TW)*(gh-18);
      i===0?ctx.moveTo(hx,hy):ctx.lineTo(hx,hy);
    });
    ctx.stroke();
  }
  // Plane
  var plx=s.x-camX,ply=s.y;
  ctx.save();ctx.translate(plx,ply);
  ctx.fillStyle="#e8f4fd";ctx.beginPath();ctx.ellipse(0,0,28,8,0,0,Math.PI*2);ctx.fill();
  ctx.fillStyle="#90caf9";
  ctx.beginPath();ctx.moveTo(-7,-2);ctx.lineTo(7,-2);ctx.lineTo(4,-16);ctx.lineTo(-13,-16);ctx.closePath();ctx.fill();
  ctx.beginPath();ctx.moveTo(-24,-2);ctx.lineTo(-17,-2);ctx.lineTo(-15,-10);ctx.lineTo(-26,-10);ctx.closePath();ctx.fill();
  ctx.fillStyle="#29b6f6";ctx.beginPath();ctx.ellipse(9,-3,7,5,0,0,Math.PI*2);ctx.fill();
  ctx.strokeStyle="#ffd54f";ctx.lineWidth=3;
  ctx.beginPath();ctx.moveTo(28,-10);ctx.lineTo(28,10);ctx.stroke();
  ctx.restore();
}

function updateHud(){
  var s=S;
  document.getElementById("ht").textContent=s.t.toFixed(1)+"s";
  document.getElementById("hx").textContent=Math.round(s.x)+"m";
  document.getElementById("hdx").textContent=Math.round(s.x)+"m";
  document.getElementById("hspd").textContent=Math.abs(s.vx).toFixed(0)+"m/s";
  document.getElementById("hvel").textContent=(s.vx>=0?"+":"")+s.vx.toFixed(0)+"m/s";
  document.getElementById("hq").textContent=qScore+"/3";
}

function updateMinimap(){
  var W=Math.min(window.innerWidth-16,800);
  var svg=document.getElementById("minimap");
  svg.setAttribute("width",W);
  var h='<rect x="0" y="10" width="'+W+'" height="8" rx="4" fill="#1a2a3a"/>';
  STOPS.forEach(function(st){
    var sx=(st.x/TW)*W;
    h+='<line x1="'+sx+'" y1="6" x2="'+sx+'" y2="22" stroke="'+st.color+'" stroke-width="1.5"/>';
    h+='<text x="'+sx+'" y="5" text-anchor="middle" font-size="9" fill="'+st.color+'">'+st.icon+'</text>';
  });
  QUIZZES.forEach(function(q){
    var sx=(q.x/TW)*W;
    h+='<line x1="'+sx+'" y1="6" x2="'+sx+'" y2="22" stroke="#ff9800" stroke-width="1.5"/>';
    h+='<text x="'+sx+'" y="5" text-anchor="middle" font-size="9" fill="#ff9800">🧠</text>';
  });
  h+='<text x="'+(W-4)+'" y="16" text-anchor="end" font-size="11" fill="#a5d6a7">🏁</text>';
  var px=Math.min((S.x/TW)*W,W-8);
  h+='<rect x="'+(px-4)+'" y="8" width="8" height="12" rx="2" fill="#4fc3f7"/>';
  svg.innerHTML=h;
  // legend
  var leg="";
  STOPS.forEach(function(st){leg+='<span style="color:'+st.color+';margin-right:7px">'+st.icon+' '+st.title+'</span>';});
  leg+='<span style="color:#ff9800">🧠 Quiz ×3</span> · <span style="color:#a5d6a7">🏁 Meta 3200m</span>';
  document.getElementById("mapleg").innerHTML=leg;
}

// ── OVERLAY ───────────────────────────────────────────────────────────────────
var ov=document.getElementById("overlay");
var ab=document.getElementById("alertbar");

function showConcept(st){
  paused=true;
  ov.style.display="flex";
  ov.innerHTML='<div class="modal" style="border:3px solid '+st.color+';box-shadow:0 0 40px '+st.color+'44;">'+
    '<div style="font-size:40px">'+st.icon+'</div>'+
    '<h2 style="color:'+st.color+'">'+st.title+'</h2>'+
    '<p class="def">'+st.def+'</p>'+
    '<div class="ej">💡 '+st.ej+'</div>'+
    '<button class="bok" style="background:'+st.color+';color:#000" onclick="closeOv()">¡Entendido! Seguir volando ✈️</button>'+
    '</div>';
}

function showQuiz(q,idx){
  paused=true;
  ov.style.display="flex";
  var opts="";
  q.opts.forEach(function(o,i){
    opts+='<button class="qopt" onclick="answerQ('+i+','+idx+')">'+"ABCD"[i]+") "+o+'</button>';
  });
  ov.innerHTML='<div class="modal" style="border:3px solid #ff9800;box-shadow:0 0 40px #ff980044;">'+
    '<div style="color:#ff9800;font-weight:bold;font-size:16px;margin-bottom:10px">🧠 QUIZ</div>'+
    '<p class="def" style="margin-bottom:12px">'+q.q+'</p>'+opts+'</div>';
}

function answerQ(i,idx){
  var q=QUIZZES[idx],ok=i===q.c;
  if(ok)qScore++;
  ov.innerHTML='<div class="modal" style="border:3px solid '+(ok?"#a5d6a7":"#ef9a9a")+';box-shadow:0 0 40px '+(ok?"#a5d6a744":"#ef9a9a44")+';">'+
    '<div style="font-size:42px">'+(ok?"✅":"❌")+'</div>'+
    '<h2 style="color:'+(ok?"#a5d6a7":"#ef9a9a")+'">'+(ok?"¡Correcto!":"Incorrecto")+'</h2>'+
    '<div class="rbox" style="background:'+(ok?"rgba(0,80,0,0.5)":"rgba(80,0,0,0.5)")+';border:1px solid '+(ok?"#a5d6a7":"#ef9a9a")+'">'+q.exp+'</div>'+
    '<p style="color:#aaa;font-size:12px;margin-top:10px">Cerrando en 3 s...</p></div>';
  setTimeout(function(){closeOv();},3000);
}

function closeOv(){
  ov.style.display="none";ov.innerHTML="";
  paused=false;lastTs=null;ab.style.display="none";
  requestAnimationFrame(loop);
}

function showAlert(txt,color){
  ab.textContent=txt;ab.style.display="block";
  ab.style.border="2px solid "+color;ab.style.color=color;
  ab.style.background="rgba(0,0,0,0.88)";
}

function showGameOver(){
  paused=true;
  var vm=(S.x/Math.max(S.t,0.1)).toFixed(1);
  ov.style.display="flex";
  ov.innerHTML='<div class="modal" style="border:3px solid #a5d6a7;box-shadow:0 0 40px #a5d6a744;">'+
    '<div style="font-size:50px">🏁</div>'+
    '<h2 style="color:#a5d6a7">¡Llegaste a la meta!</h2>'+
    '<p class="def">Tiempo total: <b style="color:#fff176">'+S.t.toFixed(1)+' s</b></p>'+
    '<p class="def">Desplazamiento: <b style="color:#ffab91">'+Math.round(S.x)+' m</b></p>'+
    '<p class="def">Velocidad media: <b style="color:#f48fb1">'+vm+' m/s</b></p>'+
    '<p class="def" style="margin-bottom:14px">Quiz: <b style="color:#a5d6a7">'+qScore+'/3 ✅</b></p>'+
    '<button class="bok" style="background:#2e7d32;color:#fff" onclick="restartGame()">Volar de nuevo 🔄</button>'+
    '</div>';
}

function restartGame(){
  S={x:50,y:CH*0.38,vx:0,vy:0,t:0,hist:[],seenS:new Set(),seenQ:new Set()};
  qScore=0;paused=false;lastTs=null;
  ov.style.display="none";ov.innerHTML="";ab.style.display="none";
  requestAnimationFrame(loop);
}

// ── GAME LOOP ─────────────────────────────────────────────────────────────────
function loop(ts){
  if(paused)return;
  if(!lastTs)lastTs=ts;
  var dt=Math.min((ts-lastTs)/1000,0.05);lastTs=ts;
  var s=S,A=220,BR=0.68,DR=0.94,MX=260,GV=80,MY=110;
  if(keys.R)s.vx=Math.min(s.vx+A*dt,MX);
  else if(keys.L)s.vx=Math.max(s.vx-A*dt*2,-MX*0.4);
  else s.vx*=BR;
  if(keys.U)s.vy=Math.max(s.vy-A*dt,-MY);
  if(keys.D)s.vy=Math.min(s.vy+A*dt,MY);
  s.vx*=DR;s.vy+=GV*dt*0.4;s.vy*=DR;
  s.x=Math.max(0,Math.min(TW,s.x+s.vx*dt));
  s.y=Math.max(50,Math.min(GY-12,s.y+s.vy*dt));
  s.t+=dt;
  if(!s.hist.length||s.t-s.hist[s.hist.length-1].t>0.25){
    s.hist.push({t:s.t,x:s.x});if(s.hist.length>150)s.hist.shift();
  }
  drawScene();updateHud();updateMinimap();

  // Alert
  var found=false;
  STOPS.forEach(function(st){if(!s.seenS.has(st.id)&&s.x<st.x&&st.x-s.x<180){showAlert("⚠️ "+st.icon+" "+st.title+" — ¡Próximo!",st.color);found=true;}});
  QUIZZES.forEach(function(q,i){if(!s.seenQ.has(i)&&s.x<q.x&&q.x-s.x<180){showAlert("⚠️ 🧠 QUIZ próximo","#ff9800");found=true;}});
  if(!found)ab.style.display="none";

  // Triggers
  var triggered=false;
  STOPS.forEach(function(st){if(!triggered&&!s.seenS.has(st.id)&&Math.abs(s.x-st.x)<55){s.seenS.add(st.id);showConcept(st);triggered=true;}});
  if(!triggered)QUIZZES.forEach(function(q,i){if(!triggered&&!s.seenQ.has(i)&&Math.abs(s.x-q.x)<55){s.seenQ.add(i);showQuiz(q,i);triggered=true;}});
  if(!triggered&&s.x>=TW-30){showGameOver();return;}
  if(!triggered)animId=requestAnimationFrame(loop);
}
